<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXIOM // LIVE USER FEED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg:        #060810;
      --panel:     #0b0e18;
      --border:    #161a2a;
      --border2:   #1e2438;
      --up:        #00e676;
      --up-dim:    rgba(0,230,118,0.12);
      --down:      #ff3d5a;
      --down-dim:  rgba(255,61,90,0.12);
      --accent:    #4fc3f7;
      --accent2:   #7c4dff;
      --text:      #c8d0e8;
      --text-dim:  #5a6180;
      --text-faint:#2a2f45;
      --glow-g:    0 0 20px rgba(0,230,118,0.35);
      --glow-r:    0 0 20px rgba(255,61,90,0.35);
      --glow-a:    0 0 20px rgba(79,195,247,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1000; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
    }

    /* ── scanlines ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    .app {
      display: flex; flex-direction: column;
      width: 100vw; height: 100vh;
      padding: 0;
    }

    /* ── TOP HEADER ── */
    header {
      display: flex; align-items: center; gap: 0;
      height: 52px; min-height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.5;
    }

    .logo-block {
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px;
      border-right: 1px solid var(--border);
      height: 100%;
    }

    .logo-icon {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: #fff;
    }

    .logo-sub {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: -2px;
    }

    .header-stat {
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 24px;
      border-right: 1px solid var(--border);
      height: 100%;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    .stat-value.up   { color: var(--up);   text-shadow: var(--glow-g); }
    .stat-value.down { color: var(--down);  text-shadow: var(--glow-r); }

    .live-badge {
      display: flex; align-items: center; gap: 7px;
      padding: 0 20px;
      margin-left: auto;
    }

    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--up);
      box-shadow: var(--glow-g);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .live-dot.error {
      background: var(--down);
      box-shadow: var(--glow-r);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .live-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── TICKER HERO ── */
    .hero {
      display: flex; align-items: flex-end; gap: 16px;
      padding: 14px 24px 0;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      min-height: 80px;
    }

    .current-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 62px;
      line-height: 1;
      letter-spacing: 2px;
      color: #fff;
      transition: color 0.25s, text-shadow 0.25s;
    }

    .current-count.up   { color: var(--up);   text-shadow: var(--glow-g); }
    .current-count.down { color: var(--down);  text-shadow: var(--glow-r); }

    .count-change {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 1px;
      transition: color 0.25s;
    }

    .count-change.up   { color: var(--up); }
    .count-change.down { color: var(--down); }

    .ohlc-strip {
      display: flex; gap: 0;
      margin-left: auto;
      margin-bottom: 8px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      overflow: hidden;
    }

    .ohlc-item {
      display: flex; flex-direction: column;
      padding: 6px 14px;
      border-right: 1px solid var(--border2);
    }
    .ohlc-item:last-child { border-right: none; }

    .ohlc-key {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-faint);
      text-transform: uppercase;
    }

    .ohlc-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .ohlc-val.green { color: var(--up); }
    .ohlc-val.red   { color: var(--down); }

    /* ── TIMEFRAME BAR ── */
    .tf-bar {
      display: flex; align-items: center; gap: 2px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .tf-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-right: 8px;
    }

    .tf-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .tf-btn:hover {
      color: var(--text);
      border-color: var(--border2);
    }

    .tf-btn.active {
      background: var(--border2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .separator {
      flex: 1;
    }

    .status-line {
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 1px;
    }

    /* ── CHART AREA ── */
    .chart-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    /* ── ERROR / LOADING overlay ── */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.5s;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-icon {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--text-faint);
    }

    .overlay-text {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── BOTTOM STATUS BAR ── */
    .status-bar {
      height: 28px; min-height: 28px;
      display: flex; align-items: center;
      gap: 0;
      border-top: 1px solid var(--border);
      background: var(--panel);
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 1px;
      overflow: hidden;
    }

    .sb-item {
      padding: 0 16px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      height: 100%;
    }

    .sb-accent { color: var(--text-dim); }

    /* responsive */
    @media (max-width: 640px) {
      .hero { flex-wrap: wrap; min-height: auto; padding: 10px 16px 0; }
      .current-count { font-size: 42px; }
      .ohlc-strip { margin-left: 0; width: 100%; }
      .ohlc-item { padding: 6px 10px; }
      header { height: 44px; }
      .logo-text { font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo-block">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-text">AXIOM</div>
        <div class="logo-sub">User Chart</div>
      </div>
    </div>

    <div class="header-stat">
      <div class="stat-label">Session High</div>
      <div class="stat-value" id="hdr-high">—</div>
    </div>

    <div class="header-stat">
      <div class="stat-label">Session Low</div>
      <div class="stat-value" id="hdr-low">—</div>
    </div>

    <div class="header-stat">
      <div class="stat-label">Samples</div>
      <div class="stat-value" id="hdr-samples">0</div>
    </div>

    <div class="header-stat">
      <div class="stat-label">Candles</div>
      <div class="stat-value" id="hdr-candles">0</div>
    </div>

    <div class="live-badge">
      <div class="live-dot" id="live-dot"></div>
      <span class="live-text" id="live-text">connecting</span>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div>
      <div class="current-count" id="count-display">—</div>
    </div>
    <div class="count-change" id="count-change"></div>

    <div class="ohlc-strip" id="ohlc-strip">
      <div class="ohlc-item">
        <div class="ohlc-key">O</div>
        <div class="ohlc-val" id="ohlc-o">—</div>
      </div>
      <div class="ohlc-item">
        <div class="ohlc-key">H</div>
        <div class="ohlc-val green" id="ohlc-h">—</div>
      </div>
      <div class="ohlc-item">
        <div class="ohlc-key">L</div>
        <div class="ohlc-val red" id="ohlc-l">—</div>
      </div>
      <div class="ohlc-item">
        <div class="ohlc-key">C</div>
        <div class="ohlc-val" id="ohlc-c">—</div>
      </div>
      <div class="ohlc-item">
        <div class="ohlc-key">VOL</div>
        <div class="ohlc-val" id="ohlc-v">—</div>
      </div>
    </div>
  </div>

  <!-- TIMEFRAME BAR -->
  <div class="tf-bar">
    <span class="tf-label">TF</span>
    <button class="tf-btn" data-tf="10">10s</button>
    <button class="tf-btn active" data-tf="30">30s</button>
    <button class="tf-btn" data-tf="60">1m</button>
    <button class="tf-btn" data-tf="300">5m</button>
    <div class="separator"></div>
    <span class="status-line" id="next-candle">next candle in —</span>
  </div>

  <!-- CHART -->
  <div class="chart-wrap">
    <div id="chart"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-icon">AXIOM</div>
      <div class="overlay-text">Connecting to feed<span class="blink">_</span></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="sb-item">
      <span>AXIOM.TRADE</span>
    </div>
    <div class="sb-item">
      <span>SOURCE</span>
      <span class="sb-accent">api6.axiom.trade/online-users-count</span>
    </div>
    <div class="sb-item">
      <span>INTERVAL</span>
      <span class="sb-accent">1s</span>
    </div>
    <div class="sb-item">
      <span>LAST UPDATE</span>
      <span class="sb-accent" id="sb-time">—</span>
    </div>
    <div class="sb-item">
      <span id="sb-status" class="sb-accent">INITIALIZING</span>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ── Config ───────────────────────────────────────────────────────────
  const API_URL    = 'https://api6.axiom.trade/online-users-count';
  const POLL_MS    = 1000;

  // ── State ────────────────────────────────────────────────────────────
  let timeframeSec = 30;
  let rawSamples   = [];      // { t: epochMs, v: number }
  let candles      = [];      // { time, open, high, low, close, volume }
  let currentCandle = null;
  let sessionHigh  = null;
  let sessionLow   = null;
  let lastValue    = null;
  let sampleCount  = 0;

  // ── Chart setup ──────────────────────────────────────────────────────
  const chartEl = document.getElementById('chart');

  const chart = LightweightCharts.createChart(chartEl, {
    layout: {
      background:  { color: '#060810' },
      textColor:   '#5a6180',
      fontFamily:  "'IBM Plex Mono', monospace",
      fontSize:    11,
    },
    grid: {
      vertLines: { color: '#0f1220', style: 1 },
      horzLines: { color: '#0f1220', style: 1 },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: 'rgba(79,195,247,0.3)', labelBackgroundColor: '#0b0e18' },
      horzLine: { color: 'rgba(79,195,247,0.3)', labelBackgroundColor: '#0b0e18' },
    },
    rightPriceScale: {
      borderColor: '#161a2a',
      scaleMargins: { top: 0.05, bottom: 0.25 },
    },
    timeScale: {
      borderColor:        '#161a2a',
      timeVisible:        true,
      secondsVisible:     true,
      fixLeftEdge:        false,
      fixRightEdge:       false,
      rightOffset:        8,
      shiftVisibleRangeOnNewBar: true,
    },
    handleScroll:    { mouseWheel: true, pressedMouseMove: true },
    handleScale:     { mouseWheel: true, pinch: true },
  });

  const candleSeries = chart.addCandlestickSeries({
    upColor:          '#00e676',
    downColor:        '#ff3d5a',
    borderUpColor:    '#00e676',
    borderDownColor:  '#ff3d5a',
    wickUpColor:      'rgba(0,230,118,0.6)',
    wickDownColor:    'rgba(255,61,90,0.6)',
    priceLineVisible: true,
    priceLineColor:   'rgba(79,195,247,0.4)',
    lastValueVisible: true,
  });

  const volumeSeries = chart.addHistogramSeries({
    priceFormat:   { type: 'volume' },
    priceScaleId:  'vol',
    color:         'rgba(79,195,247,0.18)',
  });

  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.82, bottom: 0 },
  });

  // ── Resize observer ──────────────────────────────────────────────────
  const resizeObs = new ResizeObserver(entries => {
    const e = entries[0];
    if (e) chart.applyOptions({ width: e.contentRect.width, height: e.contentRect.height });
  });
  resizeObs.observe(chartEl);

  // ── Parse API value ───────────────────────────────────────────────────
  function parseCount(data) {
    if (typeof data === 'number')           return data;
    if (typeof data === 'string')           return parseInt(data, 10);
    if (data && typeof data === 'object') {
      const v = data.count ?? data.onlineUsers ?? data.online_users
             ?? data.users ?? data.total ?? Object.values(data)[0];
      return typeof v === 'number' ? v : parseInt(v, 10);
    }
    return NaN;
  }

  // ── Candle math ───────────────────────────────────────────────────────
  function floorToTF(epochMs) {
    return Math.floor(epochMs / 1000 / timeframeSec) * timeframeSec;
  }

  function ingestValue(value, epochMs) {
    const tfTime = floorToTF(epochMs);

    if (!currentCandle || currentCandle.time !== tfTime) {
      // push completed candle
      if (currentCandle) {
        candles.push({ ...currentCandle });
      }
      currentCandle = {
        time:   tfTime,
        open:   value,
        high:   value,
        low:    value,
        close:  value,
        volume: 1,
      };
    } else {
      if (value > currentCandle.high) currentCandle.high = value;
      if (value < currentCandle.low)  currentCandle.low  = value;
      currentCandle.close  = value;
      currentCandle.volume += 1;
    }
  }

  // ── Push to chart ─────────────────────────────────────────────────────
  function pushToChart() {
    if (!currentCandle) return;

    const allCandles = [...candles, currentCandle];
    const allVolume  = allCandles.map(c => ({
      time:  c.time,
      value: c.volume,
      color: c.close >= c.open ? 'rgba(0,230,118,0.22)' : 'rgba(255,61,90,0.18)',
    }));

    candleSeries.setData(allCandles);
    volumeSeries.setData(allVolume);

    // scroll right
    chart.timeScale().scrollToRealTime();
  }

  // ── Update DOM ────────────────────────────────────────────────────────
  const countEl    = document.getElementById('count-display');
  const changeEl   = document.getElementById('count-change');
  const ohlcO      = document.getElementById('ohlc-o');
  const ohlcH      = document.getElementById('ohlc-h');
  const ohlcL      = document.getElementById('ohlc-l');
  const ohlcC      = document.getElementById('ohlc-c');
  const ohlcV      = document.getElementById('ohlc-v');
  const hdrHigh    = document.getElementById('hdr-high');
  const hdrLow     = document.getElementById('hdr-low');
  const hdrSamples = document.getElementById('hdr-samples');
  const hdrCandles = document.getElementById('hdr-candles');
  const liveDot    = document.getElementById('live-dot');
  const liveText   = document.getElementById('live-text');
  const sbTime     = document.getElementById('sb-time');
  const sbStatus   = document.getElementById('sb-status');
  const nextCandle = document.getElementById('next-candle');
  const overlay    = document.getElementById('overlay');

  function updateDOM(value) {
    const delta = lastValue !== null ? value - lastValue : 0;
    const dir   = delta > 0 ? 'up' : delta < 0 ? 'down' : '';

    // big number
    countEl.textContent = value.toLocaleString();
    countEl.className   = 'current-count ' + dir;

    // change indicator
    if (delta !== 0) {
      changeEl.textContent = (delta > 0 ? '+' : '') + delta.toLocaleString();
      changeEl.className   = 'count-change ' + dir;
    }

    // OHLC strip from current candle
    if (currentCandle) {
      ohlcO.textContent = currentCandle.open.toLocaleString();
      ohlcH.textContent = currentCandle.high.toLocaleString();
      ohlcL.textContent = currentCandle.low.toLocaleString();
      ohlcC.textContent = currentCandle.close.toLocaleString();
      ohlcV.textContent = currentCandle.volume;
    }

    // session stats
    if (sessionHigh !== null) {
      hdrHigh.textContent  = sessionHigh.toLocaleString();
      hdrLow.textContent   = sessionLow.toLocaleString();
      const prev = lastValue;
      if (prev !== null) {
        hdrHigh.className = 'stat-value' + (value >= prev ? ' up' : '');
        hdrLow.className  = 'stat-value' + (value <= prev ? ' down' : '');
      }
    }

    hdrSamples.textContent = sampleCount.toLocaleString();
    hdrCandles.textContent = (candles.length + (currentCandle ? 1 : 0)).toString();

    // next candle countdown
    const now     = Date.now();
    const tfTime  = floorToTF(now);
    const nextTs  = (tfTime + timeframeSec) * 1000;
    const secLeft = Math.max(0, Math.round((nextTs - now) / 1000));
    nextCandle.textContent = `next candle in ${secLeft}s`;

    // status bar time
    sbTime.textContent = new Date().toLocaleTimeString('en-US', {
      hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
    });

    lastValue = value;
  }

  function setConnected() {
    overlay.classList.add('hidden');
    liveDot.className  = 'live-dot';
    liveText.textContent = 'live';
    sbStatus.textContent = 'CONNECTED';
  }

  function setError(msg) {
    liveDot.className  = 'live-dot error';
    liveText.textContent = 'error';
    sbStatus.textContent = msg || 'ERROR';
  }

  // ── Rebuild candles from scratch on TF change ─────────────────────────
  function rebuildCandles() {
    candles       = [];
    currentCandle = null;
    for (const s of rawSamples) {
      ingestValue(s.v, s.t);
    }
    pushToChart();
  }

  // ── Timeframe buttons ─────────────────────────────────────────────────
  document.querySelectorAll('.tf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      timeframeSec = parseInt(btn.dataset.tf, 10);
      rebuildCandles();
    });
  });

  // ── Poll ──────────────────────────────────────────────────────────────
  let connected = false;
  let failCount = 0;

  async function poll() {
    try {
      const res  = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const val  = parseCount(data);
      if (isNaN(val)) throw new Error('unparseable response');

      failCount = 0;
      sampleCount++;

      const now = Date.now();
      rawSamples.push({ t: now, v: val });

      // session hi/lo
      if (sessionHigh === null || val > sessionHigh) sessionHigh = val;
      if (sessionLow  === null || val < sessionLow)  sessionLow  = val;

      ingestValue(val, now);
      pushToChart();
      updateDOM(val);

      if (!connected) { connected = true; setConnected(); }

    } catch (err) {
      failCount++;
      setError(failCount > 3 ? 'FEED UNAVAILABLE' : 'RETRYING...');
      console.warn('[axiom-chart]', err.message);
    }
  }

  // Kick off
  poll();
  setInterval(poll, POLL_MS);

  // Countdown tick (every second regardless)
  setInterval(() => {
    if (!currentCandle) return;
    const now     = Date.now();
    const tfTime  = floorToTF(now);
    const nextTs  = (tfTime + timeframeSec) * 1000;
    const secLeft = Math.max(0, Math.round((nextTs - now) / 1000));
    nextCandle.textContent = `next candle in ${secLeft}s`;
  }, 250);

})();
</script>
